<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Text → XLSX Converter</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0f2f5;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 40px 20px;
  }
  .card {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.10);
    padding: 36px 32px;
    width: 100%;
    max-width: 600px;
  }
  h1 {
    font-size: 1.35rem;
    font-weight: 700;
    color: #1a1a2e;
    margin-bottom: 6px;
  }
  p.sub {
    font-size: 0.875rem;
    color: #666;
    margin-bottom: 24px;
    line-height: 1.5;
  }
  label {
    font-size: 0.82rem;
    font-weight: 600;
    color: #444;
    display: block;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  textarea {
    width: 100%;
    height: 280px;
    border: 1.5px solid #d1d5db;
    border-radius: 8px;
    padding: 14px;
    font-size: 0.92rem;
    font-family: inherit;
    color: #222;
    resize: vertical;
    transition: border-color 0.2s;
    line-height: 1.55;
  }
  textarea:focus {
    outline: none;
    border-color: #4f6ef7;
    box-shadow: 0 0 0 3px rgba(79,110,247,0.12);
  }
  .preview {
    margin-top: 18px;
    background: #f8faff;
    border: 1.5px solid #e3e8ff;
    border-radius: 8px;
    padding: 14px 16px;
    display: none;
  }
  .preview h3 {
    font-size: 0.8rem;
    font-weight: 700;
    color: #4f6ef7;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 10px;
  }
  .row-item {
    font-size: 0.82rem;
    color: #333;
    padding: 4px 0;
    border-bottom: 1px solid #eef0ff;
    line-height: 1.4;
    white-space: pre-wrap;
  }
  .row-item:last-child { border-bottom: none; }
  .row-num {
    display: inline-block;
    width: 22px;
    font-weight: 700;
    color: #aaa;
    font-size: 0.75rem;
  }
  .btn {
    margin-top: 20px;
    width: 100%;
    padding: 13px;
    background: #4f6ef7;
    color: #fff;
    font-size: 1rem;
    font-weight: 600;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.18s, transform 0.1s;
    letter-spacing: 0.01em;
  }
  .btn:hover { background: #3a57e8; }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { background: #a0aec0; cursor: not-allowed; }
  .status {
    margin-top: 12px;
    font-size: 0.85rem;
    text-align: center;
    min-height: 20px;
    color: #38a169;
    font-weight: 500;
  }
  .status.err { color: #e53e3e; }
</style>
</head>
<body>
<div class="card">
  <h1>Text → XLSX Converter</h1>
  <p class="sub">Paste your text below. Each blank-line-separated block becomes one cell in column A. Click convert to auto-download the XLSX.</p>

  <label for="input">Paste your content</label>
  <textarea id="input" placeholder="Escape To Ziro Valley&#10;Arunachal's unspoiled world of green awaits&#10;&#10;Apatani Villages&#10;Meet the last generation with facial tattoos&#10;..."></textarea>

  <div class="preview" id="preview">
    <h3>Preview — <span id="rowCount">0</span> rows</h3>
    <div id="previewList"></div>
  </div>

  <button class="btn" id="btn" onclick="convert()">⬇ Convert &amp; Download XLSX</button>
  <div class="status" id="status"></div>
</div>

<script>
  const inputEl = document.getElementById('input');
  const previewEl = document.getElementById('preview');
  const previewList = document.getElementById('previewList');
  const rowCountEl = document.getElementById('rowCount');
  const statusEl = document.getElementById('status');

  function parseBlocks(raw) {
    // Split on one or more blank lines (lines that are empty or only whitespace)
    const blocks = raw.split(/\n(?:\s*\n)+/);
    return blocks
      .map(b => b.trim())
      .filter(b => b.length > 0);
  }

  inputEl.addEventListener('input', () => {
    statusEl.textContent = '';
    const blocks = parseBlocks(inputEl.value);
    if (blocks.length === 0) {
      previewEl.style.display = 'none';
      return;
    }
    previewEl.style.display = 'block';
    rowCountEl.textContent = blocks.length;
    previewList.innerHTML = blocks.map((b, i) =>
      `<div class="row-item"><span class="row-num">${i+1}</span>${escapeHtml(b)}</div>`
    ).join('');
  });

  function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function convert() {
    const raw = inputEl.value.trim();
    if (!raw) {
      statusEl.textContent = 'Please paste some content first.';
      statusEl.className = 'status err';
      return;
    }
    const blocks = parseBlocks(raw);
    if (blocks.length === 0) {
      statusEl.textContent = 'No blocks found.';
      statusEl.className = 'status err';
      return;
    }

    // Build worksheet manually to guarantee row order (aoa_to_sheet + style patching
    // can cause SheetJS to reorder keys, swapping rows like row 4 and row 8)
    const wb = XLSX.utils.book_new();
    const ws = {};

    blocks.forEach((b, i) => {
      const cellRef = XLSX.utils.encode_cell({ r: i, c: 0 });
      ws[cellRef] = {
        t: 's',
        v: b,
        s: { alignment: { wrapText: true, vertical: 'top' } }
      };
    });

    // Required: set the sheet range
    ws['!ref'] = XLSX.utils.encode_range({ s: { r: 0, c: 0 }, e: { r: blocks.length - 1, c: 0 } });

    // Set column A width
    ws['!cols'] = [{ wch: 60 }];

    XLSX.utils.book_append_sheet(wb, ws, 'Sheet1');
    XLSX.writeFile(wb, 'output.xlsx');

    statusEl.textContent = `✓ Downloaded output.xlsx with ${blocks.length} rows.`;
    statusEl.className = 'status';
  }
</script>
</body>
</html>
